<!DOCTYPE html>
<html>
<head>
    <title>SentinelIQ SOC Dashboard</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <style>
        body {
            background: #0b0f14;
            color: #00ff88;
            font-family: Arial;
        }

        #graph {
            width: 100%;
            height: 500px;
            border: 1px solid #222;
        }

        #ai-panel {
            margin-top: 20px;
            padding: 10px;
            background: #111;
            color: #00ff88;
            border: 1px solid #333;
        }
    </style>
</head>

<body>

<h2>🔥 Live SOC Stream</h2>

<div id="graph"></div>

<div id="ai-panel">
    🧠 AI SOC ANALYST: Waiting for events...
</div>

<script>
const width = 900;
const height = 500;

const svg = d3.select("#graph")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

async function loadGraph() {
    try {
        const res = await fetch("http://127.0.0.1:8000/graph");
        const data = await res.json();

        svg.selectAll("*").remove();

        const nodes = data.nodes;
        const links = data.edges;

        const simulation = d3.forceSimulation(nodes)
            .force("link", d3.forceLink(links).id(d => d.id).distance(120))
            .force("charge", d3.forceManyBody().strength(-300))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g")
            .selectAll("line")
            .data(links)
            .enter()
            .append("line")
            .attr("stroke", "#555");

        const node = svg.append("g")
            .selectAll("circle")
            .data(nodes)
            .enter()
            .append("circle")
            .attr("r", d => 8 + d.event_count)
            .attr("fill", d => {
                if (d.risk_accumulator > 70) return "red";
                if (d.risk_accumulator > 40) return "orange";
                return "green";
            });

        simulation.on("tick", () => {
            link
                .attr("x1", d => d.source.x)
                .attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x)
                .attr("y2", d => d.target.y);

            node
                .attr("cx", d => d.x)
                .attr("cy", d => d.y);
        });

        // AI Narrative
        if (nodes.length > 0) {
            const last = nodes[nodes.length - 1];

            document.getElementById("ai-panel").innerHTML =
                `⚠️ Activity detected on <b>${last.id}</b><br>
                 Risk: <b>${last.risk_accumulator}</b><br>
                 Events: <b>${last.event_count}</b>`;
        }

    } catch (err) {
        console.error(err);
        document.getElementById("ai-panel").innerHTML =
            "❌ Failed to load graph (backend not reachable)";
    }
}

setInterval(loadGraph, 2000);
loadGraph();
</script>

</body>
</html>
